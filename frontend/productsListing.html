<!DOCTYPE html>
<html>
    <head>
        <title>
            Full Stack E-Commerce Application
        </title>
        <link rel="stylesheet" href="css/styles.css">
        <link rel="stylesheet" href="css/header.css">
        <link rel="stylesheet" href="css/productsListing.css">
    </head>

    <body>
        <div id="header"></div>>

        <template id="product-card-template">
            <a href="/productPage.html/-1" class="product-link">
                <div class="product-card">
                    <img src="https://picsum.photos/175" alt="Product">
                    <div class="product-card-info">
                        <h2 class="product-card-name">Product Name</h2>
                        <p class="product-card-desc">Lorem ipsum</p>
                        <h3 class="product-card-price">Product Price</h3>
                    </div>
                </div>
            </a>
        </template>

        <div id="product-cards-container">
            <div id="product-cards">

            </div>
            <div id="page-navigator-container">
                <button id="previous-page-button">&lt;&lt;</button>
                <p id="page-number">1</p>
                <button id="next-page-button">&gt;&gt;</button>
            </div>
        </div>
        
        <script src="js/header.js"></script>
        <script src="js/products.js"></script>
        <script>
            window.addEventListener("DOMContentLoaded", async () => {
                const params = new URLSearchParams(window.location.search);
                query = params.get("query") || "";

                productCards.innerHTML = "";
                displayProducts(await fetchProducts(query, productPage, size));
                pageNumber.textContent = productPage;
            });
        </script>
    </body>
</html>
