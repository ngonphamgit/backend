<!DOCTYPE html>
<html>
    <head>
        <title>Login</title>
        <link rel="stylesheet" href="css/auth.css">
    </head>

    <body>
        <div id="auth-box">
            <div class="auth-field" id="username-field">
                <p class="field-text">Enter username</p>
                <input class="auth-input" id="username-input" type="text">
            </div>
            <div class="auth-field" id="password-field">
                <p class="field-text">Enter password</p>
                <input class="auth-input" id="password-input" type="text">
            </div>
            <button class="auth-button" id="register-button">Login</button>
        </div>

        <script src="js/login.js"></script>
    </body>
</html>
