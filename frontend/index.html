<!DOCTYPE html>
<html>
    <head>
        <title>

        <link rel="stylesheet" href="css/styles.css">

    <body>
        <h1 id="page-title">
            Full Stack E-Commerce Application
        </h1>

        <div id="search-container">
            <input id="search-bar" type="text" placeholder="Search for products">
            <button id="search-button">Search</button>
        </div>

        <template id="product-card-template">
            <div class="special-product-card">
                <img ckass="special-product-card-img" src="https://picsum.photos/175" alt="Product">

                    <h2 class="special-product-card-name">Product Name</h2>
                    <h3 class="special-product-card-price">Product Price</h3>
                </div>
            </div>
        </template>

        <div class="special-products-container" id="featured-products">
            <h1 class="special-products-title">Featured Products</h2>
            <div class="special-product-cards">
                <div class="special-product-card">
                    <img class="special-product-card-img" src="https://picsum.photos/175" alt="Product">
                    <div class="product-card-info">
                        <h2 class="special-product-card-name">Product Name</h2>
                        <p class="special-product-card-price">Product Price</p>
                    </div>
                </div>
                <div class="special-product-card">
                    <img class="special-product-card-img" src="https://picsum.photos/175" alt="Product">
                    <div class="product-card-info">
                        <h2 class="special-product-card-name">Product Name</h2>

                </div>

                    <div class="product-card-info">
                        <h2 class="special-product-card-name">Product Name</h2>
                        <p class="special-product-card-price">Product Price</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="special-products-container" id="seasonal-products">
            <h1 class="special-products-title">Seasonal Products</h2>
            <div class="special-product-cards">
                <div class="special-product-card">
                    <img class="special-product-card-img" src="https://picsum.photos/175" alt="Product">
                    <div class="product-card-info">
                        <h2 class="special-product-card-name">Product Name</h2>
                        <p class="special-product-card-price">Product Price</p>
                    </div>
                </div>
                <div class="special-product-card">
                    <img class="special-product-card-img" src="https://picsum.photos/175" alt="Product">

                        <p class="special-product-card-price">Product Price</p>
                    </div>
                </div>
                <div class="special-product-card">
                    <img class="special-product-card-img" src="https://picsum.photos/175" alt="Product">
                    <div class="product-card-info">
                        <h2 class="special-product-card-name">Product Name</h2>
                        <p class="special-product-card-price">Product Price</p>
                    </div>
                </div>
            </div>
        </div>

        <script>
            window.addEventListener("DOMContentLoaded", () => {
                const params = new URLSearchParams(window.location.search);

                const query = params.get("query") || "";
                const page = params.get("page") || 1;
                const size = params.get("size") || 10;

                fetchProducts(query, page, size);
            });
        </script>
        <script src="js/products.js"></script>
    </body>
</html>
