<!DOCTYPE html>
<html>
    <head>
        <title>
            Full Stack E-Commerce Application
        </title>
        <link rel="stylesheet" href="css/header.css">
        <link rel="stylesheet" href="css/index.css">
    </head>

    <body>
        <div id="header"></div>

        <template id="special-product-card-template">
            <div class="special-product-card">
                <img class="special-product-card-img" src="https://picsum.photos/175" alt="Product">
                <div class="product-card-info">
                    <h2 class="special-product-card-name">Product Name</h2>
                    <h3 class="special-product-card-price">Product Price</h3>
                </div>
            </div>
        </template>

        <div class="special-products-container" id="featured-products">
            <h1 class="special-products-title">Featured Products</h2>
            <div class="special-product-cards">
                
            </div>
        </div>

        <div class="special-products-container" id="seasonal-products">
            <h1 class="special-products-title">Seasonal Products</h2>
            <div class="special-product-cards">
                
            </div>
        </div>

        <script src="js/header.js"></script>
        <script src="js/products.js"></script>
        <script src="js/index.js"></script>
        <script>
            window.addEventListener("DOMContentLoaded", async () => {
                const featuredProducts = await fetchProductsByType("FEATURED");
                const seasonalProducts = await fetchProductsByType("SEASONAL");

                displaySpecialProducts(featuredProducts);
                displaySpecialProducts(seasonalProducts);
            })
        </script>
    </body>
</html>
