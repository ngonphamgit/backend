<!DOCTYPE html>
<html>
    <head>
        <title>Register</title>
        <link rel="stylesheet" href="css/auth.css">
    </head>

    <body>
        <div id="auth-box">
            <div class="auth-field" id="username-field">
                <p class="field-text">New username</p>
                <input class="auth-input" id="username-input" type="text">
            </div>
            <div class="auth-field" id="email-field">
                <p class="field-text">New email</p>
                <input class="auth-input" id="email-input" type="text">
            </div>
            <div class="auth-field" id="password-field">
                <p class="field-text">New password</p>
                <input class="auth-input" id="password-input" type="text">
            </div>
            <button class="auth-button" id="register-button">Register</button>
        </div>

        <script src="js/register.js"></script>
    </body>
</html>
