<!DOCTYPE html>
<html>
    <head>
        <title>
            Product Page
        </title>
        <link rel="stylesheet" href="css/styles.css">
        <link rel="stylesheet" href="css/header.css">
        <link rel="stylesheet" href="css/productPage.css">
    </head>

    <body>
        <div id="header"></div>

        <div id="product-page">
            <img id="product-image" src="https://picsum.photos/300" alt="Product">
            <div id="product-info">
                <h1 id="product-name">Lorem Ipsum</h1>
                <h2 id="product-price">$0.00</h3>
                <p id="product-desc">Lorem ipsum</p>
            </div>
            <div id="product-actions">
                <h1 id="stock-text">Current stock: 0</h1>
                <div id="action-buttons">
                    <button id="add-to-cart-button">Add to Cart</button>
                    <button id="add-to-favs-button">Add to Favorites</button>
                </div>
            </div>
        </div>

        <script src="js/header.js"></script>
        <script src="js/products.js"></script>
        <script src="js/productPage.js"></script>
        <script>
            window.addEventListener("DOMContentLoaded", async () => {
                const params = new URLSearchParams(window.location.search);
                id = params.get("id") || "";

                const data = await fetchProduct(id);
                displayProduct(data);
            })
        </script>
    </body>
</html>
